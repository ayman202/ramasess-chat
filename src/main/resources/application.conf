ktor {
    deployment {
        port = 8080
        port = ${?PORT}    # ✅ Railway هيحط الـ PORT هنا تلقائياً
    }
    application {
        modules = [ ApplicationKt.module ]
    }
}

jwt {
    secret = "change-this-secret-to-a-very-long-random-string-min-256-bits"
    secret = ${?JWT_SECRET}
    issuer  = "chat-app"
    audience = "chat-app-users"
    realm   = "chat-app"
    accessTokenExpiry  = 900       # 15 دقيقة
    refreshTokenExpiry = 2592000   # 30 يوم
}

database {
    url = "jdbc:postgresql://localhost:5432/chatdb"
    url = ${?DATABASE_URL}
    user     = "postgres"
    user     = ${?DB_USER}
    password = "password"
    password = ${?DB_PASSWORD}
    maxPoolSize = 10
}

redis {
    url       = "redis://localhost:6379"
    url       = ${?REDIS_URL}
    otpExpiry = 300   # 5 دقائق
}

security {
    encryptionKey = "01234567890123456789012345678901"
    encryptionKey = ${?ENCRYPTION_KEY}
}

upload {
    maxFileSizeMB = 50
    storagePath   = "uploads/"
    storagePath   = ${?STORAGE_PATH}
}

otp {
    # mock → يطبع OTP في الـ log (للتطوير)
    # twilio → يرسل SMS حقيقي
    provider = "mock"
    provider = ${?OTP_PROVIDER}
    twilio {
        accountSid  = ${?TWILIO_ACCOUNT_SID}
        authToken   = ${?TWILIO_AUTH_TOKEN}
        fromNumber  = ${?TWILIO_FROM_NUMBER}
    }
}
